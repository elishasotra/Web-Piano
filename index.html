<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
  <title>Web Piano Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>

<body>

<div class="panel">
  <div id="display">CLICK START</div>

  <div class="controls">
    <button id="startBtn">START</button>
    <button id="sustainBtn">SUSTAIN</button>
    <button id="mappingBtn">MAPPING</button>
  </div>

  <div class="controls">
    <button id="tDown">-T</button>
    <button id="tUp">+T</button>
    <button id="octDown">OCT-</button>
    <button id="octUp">OCT+</button>
  </div>

  <div id="led"></div>
</div>

<div id="piano"></div>

<script src="script.js"></script>
</body>
</html>
